<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 | Page Not Found</title>
  <meta name="description" content="Error page for missing links." />
  <style>
    :root {
      --bg: #07121c;
      --panel: rgba(13, 30, 45, 0.86);
      --text: #f2f8fc;
      --muted: #b7cad8;
      --accent: #ffb65a;
      --line: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 10% 18%, rgba(255, 182, 90, 0.2), transparent 32%),
        radial-gradient(circle at 88% 86%, rgba(99, 179, 237, 0.2), transparent 30%),
        linear-gradient(145deg, #050c12, var(--bg));
    }

    .card {
      width: min(620px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      padding: 2rem 1.4rem;
      text-align: center;
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.36);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 9vw, 4.6rem);
      line-height: 1;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    h2 {
      margin: 0.4rem 0 0.8rem;
      font-size: clamp(1.2rem, 4vw, 1.5rem);
    }

    p {
      margin: 0 auto 1.4rem;
      color: var(--muted);
      max-width: 44ch;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: #0f2435;
      background: linear-gradient(130deg, #ffd69f, var(--accent));
      border-radius: 10px;
      font-weight: 700;
      padding: 0.65rem 1rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <h2>That link does not exist</h2>
    <p>
      You probably followed a broken or outdated URL. Return to the main page to continue browsing David's capstone project.
    </p>
    <a href="index.html">Back to Home</a>
  </main>
</body>
</html>
